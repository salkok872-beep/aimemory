<select id="roomSelect" onchange="changeRoom()">
    <option value="genel">Genel Oda</option>
    <!-- JS ile role göre diğerleri eklenecek -->
</select>

<script>
    let role = "user"; // Login sonrası sunucudan gelecek

    function initRoles(userRole) {
        role = userRole;
        const select = document.getElementById('roomSelect');
        if (role === "yetkili" || role === "admin") {
            select.innerHTML += '<option value="ozel">Özel Oda</option>';
        }
        if (role === "admin") {
            select.innerHTML += '<option value="egitim">Eğitim Odası</option>';
        }
    }

    async function send() {
        const msg = document.getElementById('msg').value;
        const res = await fetch('/api/chat', {
            method: 'POST',
            body: JSON.stringify({username: currentUser, message: msg, room: currentRoom, role: role})
        });
        if(res.status === 403) alert("Buraya erişim yetkiniz yok!");
    }
</script>

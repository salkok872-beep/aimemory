<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>Gelişmiş RAG ve Sohbet Sistemi</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { width: 850px; display: flex; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; flex: 2; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .admin-panel { flex: 1; background: #2c3e50; color: white; padding: 20px; border-radius: 8px; display: none; min-width: 200px; }
        .chat-box { height: 300px; border: 1px solid #ddd; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #fff; }
        .msg { margin-bottom: 8px; padding: 6px 10px; border-radius: 4px; max-width: 80%; }
        .user-msg { background: #007bff; color: white; margin-left: auto; text-align: right; }
        .bot-msg { background: #e9ecef; color: #333; }
        .badge { font-size: 12px; padding: 3px 6px; border-radius: 4px; color: white; }
        .form-group { margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; max-width: 250px; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button.btn-alt { background: #6c757d; }
        .user-item { display:flex; justify-content:space-between; margin-bottom: 8px; font-size:14px; padding-bottom:5px; border-bottom:1px solid #34495e;}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div id="authSection">
            <h2 id="authTitle">Giriş Yap</h2>
            <div class="form-group">
                <input type="text" id="username" placeholder="Kullanıcı Adı">
                <input type="password" id="password" placeholder="Şifre">
                <button id="mainAuthBtn" onclick="login()">Giriş Yap</button>
                <button class="btn-alt" id="toggleAuthBtn" onclick="toggleAuthMode()">Hesap Oluştur (Kayıt Ol)</button>
            </div>
        </div>
        <div id="chatSection" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="chatTitle"></h3><span id="statusBadge" class="badge"></span>
            </div>
            <div class="chat-box" id="chatBox"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="userMsg" placeholder="Mesaj..." style="flex:1;" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Gönder</button>
            </div>
        </div>
    </div>
    <div class="admin-panel" id="adminPanel">
        <h3>Yetki Yönetimi</h3>
        <div id="userList"></div>
    </div>
</div>
<script>
    let currentUser = "", isPrivate = false, isLoginMode = true;
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById("authTitle").innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
        document.getElementById("mainAuthBtn").innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
        document.getElementById("toggleAuthBtn").innerText = isLoginMode ? "Hesap Oluştur (Kayıt Ol)" : "Zaten Hesabım Var (Giriş Yap)";
    }
    async function login() {
        const u = document.getElementById("username").value.trim();
        const p = document.getElementById("password").value.trim();
        if(!u || !p) return alert("Lütfen tüm alanları doldurun.");
        if (!isLoginMode) {
            const res = await fetch('/api/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:u, password:p}) });
            const data = await res.json();
            alert(data.message);
            if(data.success) toggleAuthMode();
            return;
        }
        const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:u, password:p}) });
        const data = await res.json();
        if(data.success) {
            currentUser = u; isPrivate = data.privateAccess;
            document.getElementById("authSection").style.display = "none";
            document.getElementById("chatSection").style.display = "block";
            document.getElementById("chatTitle").innerText = "Kullanıcı: " + u;
            badge();
            if(data.role === "admin") { document.getElementById("adminPanel").style.display = "block"; loadUsers(); }
        } else alert(data.message);
    }
    function badge() {
        const b = document.getElementById("statusBadge");
        b.innerText = isPrivate ? "Özel Oda (RAG)" : "Genel Oda (Ortak)";
        b.style.background = isPrivate ? "#2ecc71" : "#e74c3c";
    }
    async function sendMessage() {
        const i = document.getElementById("userMsg"), txt = i.value.trim(); if(!txt) return;
        msg(txt, 'user-msg'); i.value = "";
        const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:currentUser, message:txt}) });
        const data = await res.json(); msg(data.reply, 'bot-msg');
    }
    function msg(t, c) {
        const b = document.getElementById("chatBox"), d = document.createElement("div");
        d.className = `msg ${c}`; d.innerText = t; b.appendChild(d); b.scrollTop = b.scrollHeight;
    }
    async function loadUsers() {
        const res = await fetch('/api/admin/users'); const data = await res.json();
        const box = document.getElementById("userList"); box.innerHTML = "";
        for(let u in data.users) {
            if(u==='admin') continue;
            const div = document.createElement("div");
            div.className = "user-item";
            div.innerHTML = `<span>${u}</span> <input type="checkbox" ${data.users[u].privateAccess?'checked':''} onchange="toggle('${u}', this.checked)">`;
            box.appendChild(div);
        }
    }
    async function toggle(u, acc) {
        const res = await fetch('/api/admin/update_permission', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({target_user:u, privateAccess:acc}) });
        const data = await res.json();
        if(currentUser === u) { isPrivate = acc; badge(); }
        if(currentUser === 'admin') { loadUsers(); }
    }
</script>
</body>
</html>

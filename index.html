<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>AI Paneli</title>
</head>
<body class="bg-gray-900 text-white p-6">
    <div id="auth" class="max-w-md mx-auto bg-gray-800 p-6 rounded-lg">
        <input id="u" class="w-full p-2 bg-gray-700 rounded mb-2" placeholder="Kullanıcı">
        <input id="p" type="password" class="w-full p-2 bg-gray-700 rounded mb-2" placeholder="Şifre">
        <label><input type="checkbox" id="rem"> Beni Hatırla</label>
        <button onclick="login()" class="w-full bg-blue-600 p-2 mt-4 rounded">Giriş</button>
    </div>
    
    <div id="main" class="hidden grid grid-cols-4 gap-4">
        <div class="col-span-1 bg-gray-800 p-4 rounded">
            <select id="rooms" onchange="render()" class="w-full bg-gray-700 p-2 rounded"></select>
            <div id="adminPanel" class="mt-4 border-t pt-2 hidden"></div>
        </div>
        <div class="col-span-3 bg-gray-800 p-4 rounded">
            <div id="chatBox" class="h-64 overflow-y-auto mb-4 border-b"></div>
            <div class="flex gap-2">
                <input id="msg" class="flex-1 bg-gray-700 p-2 rounded">
                <button onclick="send()" class="bg-green-600 px-4 rounded">Gönder</button>
            </div>
        </div>
    </div>

    <script>
        // Beni Hatırla
        window.onload = () => {
            const savedU = localStorage.getItem('user');
            if(savedU) document.getElementById('u').value = savedU;
        }

        async function send() {
            const msg = document.getElementById('msg').value;
            if(!msg) return;
            
            await fetch('/api/chat', {
                method: 'POST', 
                body: JSON.stringify({user, room: document.getElementById('rooms').value, msg})
            });
            
            document.getElementById('msg').value = '';
            render(); // Gönderir göndermez ekranı güncelle
        }

        async function render() {
            const res = await fetch('/api/get_data', {method:'POST'});
            const d = await res.json();
            const room = document.getElementById('rooms').value;
            document.getElementById('chatBox').innerHTML = (d[room]||[]).map(m => 
                `<div><b>${m.user}:</b> ${m.msg}</div>`
            ).join('');
        }
        
        // Periyodik güncelleme devam etsin
        setInterval(render, 2000);
    </script>
</body>
    </html>

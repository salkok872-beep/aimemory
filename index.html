<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-5">
    <!-- Login Area -->
    <div id="loginArea" class="max-w-sm mx-auto bg-gray-800 p-6 rounded shadow">
        <h2 class="text-xl mb-4 font-bold">Giris / Kayit</h2>
        <input id="u" class="w-full bg-gray-700 p-2 mb-2 rounded text-white" placeholder="Kullanici Adi">
        <input id="p" type="password" class="w-full bg-gray-700 p-2 mb-2 rounded text-white" placeholder="Sifre">
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="rem"> Beni Hatirla</label>
        <div class="flex gap-2 mt-4">
            <button onclick="login()" class="flex-1 bg-blue-600 p-2 rounded hover:bg-blue-500">Giris</button>
            <button onclick="register()" class="flex-1 bg-green-600 p-2 rounded hover:bg-green-500">Kayit</button>
        </div>
    </div>

    <!-- Main Area -->
    <div id="mainArea" class="hidden grid grid-cols-4 gap-4">
        <div class="col-span-1 bg-gray-800 p-4 rounded">
            <select id="rooms" onchange="render()" class="w-full bg-gray-700 p-2 mb-4 text-white rounded">
                <option value="genel">Genel</option>
            </select>
            <div id="adminPanel" class="hidden border-t border-gray-700 pt-4">
                <h3 class="text-sm font-bold mb-2">Yetkilendirme</h3>
                <div id="userList" class="text-sm space-y-1"></div>
            </div>
        </div>
        <div class="col-span-3 bg-gray-800 p-4 rounded">
            <div id="chatBox" class="h-64 overflow-y-auto mb-4 bg-gray-900 p-2 rounded border border-gray-700"></div>
            <div class="flex gap-2">
                <input id="msg" onkeypress="if(event.key==='Enter') send()" class="flex-1 bg-gray-700 p-2 rounded text-white" placeholder="Mesajinizi yazin...">
                <button onclick="send()" class="bg-blue-600 px-4 rounded hover:bg-blue-500">Gonder</button>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000";
        let user, role, authorized;

        window.onload = () => { 
            const savedUser = localStorage.getItem('u');
            if(savedUser) document.getElementById('u').value = savedUser; 
        }

        async function post(url, data) {
            try {
                const res = await fetch(API + url, {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                return await res.json();
            } catch (e) { return {success: false}; }
        }

        async function login() {
            user = document.getElementById('u').value;
            const res = await post("/api/login", {u: user, p: document.getElementById('p').value});
            if(res.success) {
                if(document.getElementById('rem').checked) localStorage.setItem('u', user);
                else localStorage.removeItem('u');
                
                role = res.role; authorized = res.authorized;
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainArea').classList.remove('hidden');
                initRooms();
            } else { alert("Giris basarisiz!"); }
        }

        async function register() {
            const res = await post("/api/register", {u: document.getElementById('u').value, p: document.getElementById('p').value});
            alert(res.success ? "Kayit Basarili" : res.msg);
        }

        function initRooms() {
            const s = document.getElementById('rooms');
            s.innerHTML = '<option value="genel">Genel</option>';
            if(role === 'admin' || authorized) s.innerHTML += '<option value="ozel">Ozel</option>';
            if(role === 'admin') { 
                s.innerHTML += '<option value="egitim">Egitim</option>'; 
                document.getElementById('adminPanel').classList.remove('hidden'); 
            }
            render(); 
            setInterval(render, 3000);
        }

        async function render() {
            const d = await post("/api/get_data", {});
            const chatBox = document.getElementById('chatBox');
            const currentRoom = document.getElementById('rooms').value;
            
            if(d.chats) {
                const newHtml = (d.chats[currentRoom]||[]).map(m => 
                    `<div class="mb-2 p-1 border-b border-gray-800"><b>${m.user}:</b> ${m.msg} ${m.reply ? `<br><span class="text-blue-400 text-xs">${m.reply}</span>` : ''}</div>`
                ).join('');
                
                if(chatBox.innerHTML !== newHtml) {
                    chatBox.innerHTML = newHtml;
                    chatBox.scrollTop = chatBox.scrollHeight; // Otomatik aşağı kaydır
                }
            }

            if(role === 'admin' && d.users) {
                document.getElementById('userList').innerHTML = Object.keys(d.users).map(u => `
                    <div class="flex items-center gap-2">
                        <input type="checkbox" ${d.users[u].authorized ? 'checked' : ''} onchange="authorize('${u}', this.checked)"> ${u}
                    </div>
                `).join('');
            }
        }

        async function send() {
            const msgInput = document.getElementById('msg');
            if(!msgInput.value.trim()) return;
            await post("/api/chat", {user, room: document.getElementById('rooms').value, msg: msgInput.value});
            msgInput.value = ''; 
            render();
        }

        async function authorize(u, isAuthorized) { 
            await post("/api/admin/authorize", {user: u, status: isAuthorized}); 
            render(); 
        }
    </script>
</body>
                </html>

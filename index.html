<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-900 text-white p-5">
    <div id="loginArea" class="max-w-sm mx-auto bg-gray-800 p-6 rounded shadow">
        <h2 class="text-xl mb-4 font-bold">Giriş / Kayıt</h2>
        <input id="u" class="w-full bg-gray-700 p-2 mb-2 rounded" placeholder="Kullanıcı">
        <input id="p" type="password" class="w-full bg-gray-700 p-2 mb-2 rounded" placeholder="Şifre">
        <div class="flex gap-2 mt-4">
            <button onclick="login()" class="flex-1 bg-blue-600 p-2 rounded">Giriş</button>
            <button onclick="register()" class="flex-1 bg-green-600 p-2 rounded">Kayıt</button>
        </div>
    </div>
    <div id="mainArea" class="hidden grid grid-cols-4 gap-4">
        <div class="col-span-1 bg-gray-800 p-4 rounded h-[80vh]">
            <select id="rooms" onchange="render()" class="w-full bg-gray-700 p-2 mb-4 text-white rounded">
                <option value="genel">Genel</option><option value="egitim">Eğitim</option>
            </select>
            <div id="adminPanel" class="hidden border-t pt-4">
                <h3 class="text-sm font-bold">Yetkilendirme</h3>
                <div id="userList" class="text-sm"></div>
            </div>
        </div>
        <div class="col-span-3 bg-gray-800 p-4 rounded h-[80vh] flex flex-col">
            <div id="chatBox" class="flex-1 overflow-y-auto mb-4 bg-gray-900 p-2 rounded border border-gray-700"></div>
            <div class="flex gap-2"><input id="msg" class="flex-1 bg-gray-700 p-2 rounded" placeholder="Mesaj..."><button onclick="send()" class="bg-blue-600 px-4 rounded">Gönder</button></div>
        </div>
    </div>
    <script>
        const API = "http://localhost:8000";
        let user, role;
        async function post(u, d) { return await (await fetch(API + u, {method:'POST', body:JSON.stringify(d)})).json(); }
        async function login() {
            let res = await post("/api/login", {u: document.getElementById('u').value, p: document.getElementById('p').value});
            if(res.success) {
                user = document.getElementById('u').value; role = res.role;
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainArea').classList.remove('hidden');
                if(role === 'admin') document.getElementById('adminPanel').classList.remove('hidden');
                setInterval(render, 3000); render();
            } else alert("Giriş Hatalı!");
        }
        async function register() {
            let res = await post("/api/register", {u: document.getElementById('u').value, p: document.getElementById('p').value});
            alert(res.success ? "Başarılı" : res.msg);
        }
        async function render() {
            let d = await post("/api/get_data", {});
            let r = document.getElementById('rooms').value;
            let m = (r==='genel') ? d.genel : (r==='egitim') ? d.egitim : (d.ozel[r+'.txt']||[]);
            document.getElementById('chatBox').innerHTML = m.map(x => `<div><b>${x.user}:</b> ${x.msg}</div>`).join('');
            if(role === 'admin') document.getElementById('userList').innerHTML = Object.keys(d.users).map(u => `<div class="mt-2"><input type="checkbox" ${d.users[u].authorized?'checked':''} onchange="authorize('${u}', this.checked)"> ${u}</div>`).join('');
        }
        async function send() {
            await post("/api/chat", {user, room: document.getElementById('rooms').value, msg: document.getElementById('msg').value});
            document.getElementById('msg').value = ''; render();
        }
        async function authorize(u, s) { await post("/api/admin/authorize", {user:u, status:s}); render(); }
    </script>
</body>
            </html>

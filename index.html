<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>AI Yönetim Paneli</title></head>
<body>
    <div id="loginArea">
        <input id="u" placeholder="Kullanıcı"> <input id="p" type="password" placeholder="Şifre">
        <input type="checkbox" id="rem"> Beni Hatırla
        <button onclick="login()">Giriş Yap</button>
    </div>

    <div id="mainArea" style="display:none;">
        <select id="rooms" onchange="load()">
            <option value="genel">Genel Oda</option>
        </select>
        <div id="chatBox" style="height:300px; border:1px solid #ccc; overflow:auto;"></div>
        <input id="msg"> <button onclick="send()">Gönder</button>
        <div id="adminPanel" style="display:none; border:2px solid red; padding:10px;">
            <h3>Admin & Eğitim Paneli</h3>
            <input id="target" placeholder="Yetkilendirilecek Kullanıcı"> <button onclick="setRole()">Yetki Ver</button>
            <textarea id="edu" placeholder="AI İçin Veri Girin..."></textarea> <button onclick="upload()">AI'yı Eğit</button>
        </div>
    </div>

    <script>
        let user, role;
        async function login() {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            const res = await fetch('/api/login', {method:'POST', body:JSON.stringify({u, p})});
            const d = await res.json();
            if(d.success) {
                user = u; role = d.role;
                document.getElementById('loginArea').style.display = "none";
                document.getElementById('mainArea').style.display = "block";
                if(document.getElementById('rem').checked) localStorage.setItem('user', u);
                
                const s = document.getElementById('rooms');
                if(role == "yetkili" || role == "admin") s.innerHTML += '<option value="ozel">Özel Oda</option>';
                if(role == "admin") { s.innerHTML += '<option value="egitim">Eğitim Odası</option>'; document.getElementById('adminPanel').style.display = "block"; }
            }
        }
        async function send() {
            await fetch('/api/chat', {method:'POST', body:JSON.stringify({user, room:document.getElementById('rooms').value, msg:document.getElementById('msg').value})});
        }
        async function upload() {
            await fetch('/api/upload', {method:'POST', body:JSON.stringify({role, name:Date.now(), content:document.getElementById('edu').value})});
        }
        async function setRole() {
            await fetch('/api/set_role', {method:'POST', body:JSON.stringify({admin_p:'nimda', target:document.getElementById('target').value})});
        }
        setInterval(async () => {
            if(!user) return;
            const res = await fetch('/api/get', {method:'POST'});
            const d = await res.json();
            document.getElementById('chatBox').innerHTML = d[document.getElementById('rooms').value].map(m => `<div><b>${m.user}:</b> ${m.msg} <i>${m.reply||''}</i></div>`).join("");
        }, 3000);
    </script>
</body>
    </html>

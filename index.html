<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>AI Yönetim Paneli</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { width: 900px; display: flex; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; flex: 2; }
        .admin-panel { flex: 1; background: #2c3e50; color: white; padding: 20px; border-radius: 8px; display: none; }
        .chat-box { height: 300px; border: 1px solid #ddd; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #fff; color: black; }
        .user-item { padding: 5px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div id="authSection">
            <h2>Giriş</h2>
            <input type="text" id="username" placeholder="Kullanıcı">
            <input type="password" id="password" placeholder="Şifre">
            <button onclick="login()">Giriş Yap</button>
        </div>
        <div id="chatSection" style="display:none;">
            <div class="chat-box" id="chatBox"></div>
            <input type="text" id="userMsg" placeholder="Mesaj...">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>
    <div class="admin-panel" id="adminPanel">
        <h3>Kullanıcılar & Aktiflik</h3>
        <div id="userList"></div>
        <hr>
        <input type="text" id="fileName" placeholder="Dosya Adı">
        <textarea id="fileContent" placeholder="İçerik..."></textarea>
        <button onclick="uploadFile()">Yükle</button>
        <button onclick="triggerRAG()">Şimdi Tara</button>
    </div>
</div>
<script>
    let currentUser = "";
    async function login() {
        const u = document.getElementById("username").value;
        const res = await fetch('/api/login', { method:'POST', body: JSON.stringify({username:u, password:document.getElementById("password").value}) });
        const data = await res.json();
        if(data.success) {
            currentUser = u;
            document.getElementById("authSection").style.display = "none";
            document.getElementById("chatSection").style.display = "block";
            if(data.role === "admin") {
                document.getElementById("adminPanel").style.display = "block";
                setInterval(loadUsers, 5000);
            }
        }
    }
    async function loadUsers() {
        const res = await fetch('/api/admin/users');
        const data = await res.json();
        const box = document.getElementById("userList"); box.innerHTML = "";
        for(let u in data.users) {
            if(u==='admin') continue;
            box.innerHTML += `<div class="user-item">${data.users[u].active ? "🟢" : "🔴"} ${u}</div>`;
        }
    }
    async function uploadFile() {
        await fetch('/api/admin/upload', { method:'POST', body: JSON.stringify({admin_user:currentUser, name:document.getElementById("fileName").value, content:document.getElementById("fileContent").value}) });
        alert("Yüklendi!");
    }
    async function triggerRAG() { await fetch('/api/admin/trigger_rag'); alert("Tarandı!"); }
    async function sendMessage() {
        const msg = document.getElementById("userMsg").value;
        await fetch('/api/chat', { method:'POST', body: JSON.stringify({username:currentUser, message:msg}) });
        document.getElementById("userMsg").value = "";
    }
</script>
</body>
</html>

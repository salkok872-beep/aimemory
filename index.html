<script>
    // Kullanıcıları ve Mesajları 3 saniyede bir çek
    setInterval(async () => {
        const res = await fetch('/api/get_data'); // Sunucudan hem mesajları hem aktiflik durumunu al
        const data = await res.json();
        
        // Mesaj kutusunu güncelle
        document.getElementById("chatBox").innerHTML = data.messages.join("<br>");
        
        // Aktiflik listesini güncelle
        const userList = document.getElementById("userList");
        userList.innerHTML = "";
        for(let u in data.users) {
            userList.innerHTML += `<div>${data.users[u].active ? "🟢" : "🔴"} ${u}</div>`;
        }
    }, 3000);
</script>
